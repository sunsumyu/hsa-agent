[pytest]
# ==========================================================
# HSA Agent evaluation suites
# ==========================================================
# Default: only runs `basic` (5 cases, LLM-as-judge, highest cost).
# Other suites require explicit opt-in:
#   pytest -m fuzzy
#   pytest -m refusal
#   pytest -m rules
#   pytest -m "basic or fuzzy or refusal or rules"
# ==========================================================

asyncio_mode = auto

markers =
    basic: 5 cases, patient behavior analysis, LLM-as-judge (highest token cost)
    fuzzy: 5 cases, fuzzy-intent routing (keyword + SQL-template assertions, no LLM)
    refusal: 5 cases, injection / forbidden-table / sensitive-field rejection (regex, ~zero LLM)
    rules: 5 cases, direct SQL template activation (rule-engine routing)

# Default addopts: only run `basic` so you never accidentally burn the whole quota.
addopts = -m "basic" --strict-markers

testpaths = tests
