<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSA-Agent | 算力基础设施与物理链路监控</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --surface: rgba(15, 23, 42, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.15);
            --text: #f8fafc;
            --muted: #64748b;
            
            --volc: #ff4d4f;      /* 火山红 */
            --bailian: #10b981;    /* 百炼绿 */
            --deepseek: #818cf8;   /* 靛青 */
            
            --success: #10b981;
            --warning: #fbbf24;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at 50% 0%, #0f172a 0%, #020617 80%);
            color: var(--text);
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            padding: 40px;
            overflow-x: hidden;
        }

        /* 顶部导航与面包屑 */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .back-link {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .back-link:hover {
            color: var(--accent);
            transform: translateX(-4px);
        }

        /* 状态条 */
        .status-banner {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .status-banner.live {
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .status-banner.sandbox {
            background: rgba(251, 191, 36, 0.08);
            border: 1px solid rgba(251, 191, 36, 0.2);
            color: var(--warning);
        }

        .status-dot-pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .live .status-dot-pulse {
            background-color: var(--success);
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulse-success 2s infinite;
        }

        .sandbox .status-dot-pulse {
            background-color: var(--warning);
            box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7);
            animation: pulse-warning 2s infinite;
        }

        @keyframes pulse-success {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        @keyframes pulse-warning {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(251, 191, 36, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }

        /* 头部样式 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 35px;
        }

        .header-title h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #f8fafc 30%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .header-title p {
            color: var(--muted);
            font-size: 1rem;
            font-weight: 400;
        }

        .global-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover {
            background: #1e293b;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .btn-primary {
            background: var(--accent);
            color: #020617;
            border-color: var(--accent);
        }

        .btn-primary:hover {
            background: #7dd3fc;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        /* KPI 统计面板 */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 35px;
        }

        .kpi-card {
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px 24px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .kpi-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .kpi-label {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .kpi-value {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 8px;
        }

        .kpi-trend {
            font-size: 0.8rem;
            color: var(--muted);
        }

        /* 过滤与搜索栏 */
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            gap: 20px;
        }

        .filter-tabs {
            display: flex;
            gap: 6px;
        }

        .filter-tab {
            background: transparent;
            border: none;
            color: var(--muted);
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .filter-tab:hover {
            color: var(--text);
        }

        .filter-tab.active {
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent);
            font-weight: 600;
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 350px;
        }

        .search-input {
            width: 100%;
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px 8px 36px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            border-color: var(--accent);
            background: rgba(30, 41, 59, 0.7);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 0.9rem;
            pointer-events: none;
        }

        /* 物理算力网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
        }

        .node-card {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.15);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .node-card:hover {
            transform: translateY(-6px);
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 10px 30px -10px rgba(56, 189, 248, 0.2);
        }

        .platform-tag {
            position: absolute;
            top: 0;
            right: 0;
            padding: 5px 16px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            border-bottom-left-radius: 12px;
            letter-spacing: 0.05em;
        }

        .tag-volcengine { background: linear-gradient(135deg, var(--volc), #ff7875); color: white; }
        .tag-bailian { background: linear-gradient(135deg, var(--bailian), #52c41a); color: white; }
        .tag-deepseek { background: linear-gradient(135deg, var(--deepseek), #a4b5ff); color: white; }

        .node-id {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 4px;
            color: var(--text);
            max-width: 75%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .model-name {
            color: var(--muted);
            font-family: 'Outfit', monospace;
            font-size: 0.8rem;
            margin-bottom: 20px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        .stat-label {
            color: var(--muted);
            font-weight: 500;
        }

        .stat-value {
            font-weight: 600;
            color: var(--text);
        }

        /* 状态微章 */
        .status-pill {
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .status-pill.ACTIVE {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }

        .status-pill.STANDBY {
            background: rgba(100, 116, 139, 0.15);
            color: var(--muted);
        }

        .status-pill.BLACKLISTED {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            animation: pulse-red-pill 2s infinite;
        }

        @keyframes pulse-red-pill {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* 进度条 */
        .progress-box {
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .progress-container {
            height: 6px;
            background: #1e293b;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #818cf8);
            border-radius: 3px;
            width: 0%;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 测算容器 */
        .prediction-box {
            margin-top: auto;
            background: rgba(56, 189, 248, 0.04);
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px dashed rgba(56, 189, 248, 0.2);
            transition: all 0.3s ease;
        }

        .node-card:hover .prediction-box {
            background: rgba(56, 189, 248, 0.08);
            border-color: rgba(56, 189, 248, 0.4);
        }

        .prediction-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .prediction-label {
            font-size: 0.8rem;
            color: var(--muted);
            font-weight: 500;
        }

        .prediction-value {
            font-size: 1.15rem;
            font-weight: 800;
        }

        .prediction-sub {
            font-size: 0.65rem;
            color: var(--muted);
            margin-top: 6px;
            line-height: 1.3;
        }

        /* 报错信息悬浮提示 */
        .error-hint {
            margin-top: 10px;
            font-size: 0.72rem;
            color: var(--danger);
            background: rgba(239, 68, 68, 0.08);
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 3px solid var(--danger);
            font-family: monospace;
            word-break: break-all;
        }

        /* 空状态 */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 40px;
            background: var(--surface);
            border: 1px dashed var(--border);
            border-radius: 18px;
            color: var(--muted);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .empty-state h3 {
            color: var(--text);
            margin-bottom: 8px;
            font-size: 1.2rem;
        }

        /* 移动端自适应 */
        @media (max-width: 1024px) {
            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 20px;
            }
            .kpi-grid {
                grid-template-columns: 1fr;
            }
            .header {
                flex-direction: column;
                gap: 15px;
            }
            .filter-bar {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="index.html" class="back-link">← 返回指挥门户</a>

    <div class="header">
        <div class="header-title">

    <!-- KPI 仪表板 -->
    <div class="kpi-grid">
        <div class="kpi-card">
            <div class="kpi-label">物理节点总数</div>
            <div class="kpi-value" id="kpiTotalNodes">—</div>
            <div class="kpi-trend" id="kpiTotalNodesSub">已注册算力端点</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-label">今日总消耗</div>
            <div class="kpi-value" id="kpiTotalTokens" style="color: var(--accent)">—</div>
            <div class="kpi-trend" id="kpiTotalTokensSub">Tokens (全链路)</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-label">当前运行状况</div>
            <div class="kpi-value" id="kpiActiveCount" style="color: var(--success)">—</div>
            <div class="kpi-trend" id="kpiActiveCountSub">0 个熔断冷却中</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-label">今日预计费用</div>
            <div class="kpi-value" id="kpiCost" style="color: var(--warning)">—</div>
            <div class="kpi-trend" id="kpiCostSub">USD (本地配额估算)</div>
        </div>
    </div>

    <!-- 过滤器与搜索栏 -->
    <div class="filter-bar">
        <div class="filter-tabs">
            <button class="filter-tab active" onclick="setFilter('all', this)">全部端点</button>
            <button class="filter-tab" onclick="setFilter('volcengine', this)">火山引擎</button>
            <button class="filter-tab" onclick="setFilter('bailian', this)">阿里云百炼</button>
            <button class="filter-tab" onclick="setFilter('blacklisted', this)">异常熔断</button>
        </div>
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" class="search-input" placeholder="输入节点 ID 或模型名称进行搜索..." oninput="handleSearch()">
        </div>
    </div>

    <!-- 算力池物理网格 -->
    <div class="grid" id="nodeGrid">
        <!-- 动态渲染 -->
    </div>

    <script>
        const API_HOST = 'http://127.0.0.1:18882';
        let currentFilter = 'all';
        let searchQuery = '';
        let allEndpointsData = [];
        
        // 极致健壮：预置的高保真沙盒数据集，用于后端离线或 file:// CORS 拦截时的优雅降级

            },
            {
                id: "doubao-smart",

                status: "ACTIVE",

            {

                provider: "阿里云百炼",

                tier: 1,
                status: "STANDBY",
                daily_tokens: 939663,
                daily_requests: 12,
                daily_quota: 1000000,
                quota_pct: 94.0,

                stability: 100,
                avg_latency_ms: 1100,

                last_error: null,

            },
            {
                id: "qwen-turbo-1101",
                provider: "阿里云百炼",
                platform: "bailian",
                tier: 2,
                status: "BLACKLISTED",
                daily_tokens: 4834,
                daily_requests: 1,
                daily_quota: 10000000,
                quota_pct: 0.05,
                cost_usd: 0.005,
                stability: 12,
                avg_latency_ms: 0,
                burnout_rounds: 0,
                last_error: "Connection timeout after 30s during token audit generation.",
                pool_id: "经济型备份池"
            }
        ];

        // 格式化数字为可读缩写
        function formatNumber(n) {
            if (n >= 1000000) return (n / 1000000).toFixed(2) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
            return n.toString();
        }

        // 数据拉取与自适应解析
        async function loadData(isManual = false) {
            const statusBanner = document.getElementById('statusBanner');
            const statusText = document.getElementById('statusText');
            
            try {
                // 1. 尝试从运行中的 API 端口进行实时获取
                const response = await fetch(`${API_HOST}/api/usage/stats`);
                const json = await response.json();
                
                if (json.ok && json.data) {
                    const d = json.data;
                    
                    // 将后端的数据转换映射成符合前端渲染器的字段结构
                    allEndpointsData = d.nodes.map(n => {
                        let platform = "bailian";
                        const idLower = n.id.toLowerCase();
                        if (idLower.includes("volc") || idLower.includes("doubao") || n.provider === "火山引擎") {
                            platform = "volcengine";
                        } else if (idLower.includes("deepseek")) {
                            platform = "deepseek";
                        }
                        
                        let pool_id = "核心对话池";
                        if (idLower.includes("doubao-pro") || idLower.includes("doubao-smart")) {
                            pool_id = "Doubao 专属池";
                        } else if (idLower.includes("qwen-plus") || idLower.includes("deepseek-r1")) {
                            pool_id = "百炼优先池";
                        } else if (idLower.includes("qwen-turbo")) {
                            pool_id = "经济型备份池";
                        } else if (idLower.includes("rerank")) {
                            pool_id = "重排序池";
                        }
                        
                        return {
                            id: n.id,
                            provider: n.provider || "未知平台",
                            platform: platform,
                            tier: n.tier || 1,
                            status: n.status || "STANDBY",
                            daily_tokens: n.daily_tokens || 0,
                            daily_requests: n.daily_requests || 0,
                            daily_quota: n.daily_quota || 2000000,
                            quota_pct: n.quota_pct || 0,
                            cost_usd: n.cost_usd || 0,
                            stability: n.stability || 100,
                            avg_latency_ms: n.avg_latency_ms || 0,
                            burnout_rounds: n.burnout_rounds === 999 ? "∞" : (n.burnout_rounds || 0),
                            last_error: n.last_error || null,
                            pool_id: pool_id
                        };
                    });

                    // 渲染 KPI 数据
                    document.getElementById('kpiTotalNodes').textContent = allEndpointsData.length;
                    document.getElementById('kpiTotalTokens').textContent = formatNumber(d.total_daily_tokens);
                    document.getElementById('kpiActiveCount').textContent = `${d.active_nodes} / ${allEndpointsData.length}`;
                    document.getElementById('kpiActiveCountSub').textContent = `${d.blacklisted_nodes} 个黑名单`;
                    document.getElementById('kpiCost').textContent = `$${d.total_daily_cost_usd.toFixed(3)}`;

                    // 更新状态条
                    statusBanner.className = 'status-banner live';
                    statusText.textContent = `物理链路实时并网中 (最后同步: ${new Date().toLocaleTimeString('zh-CN')})`;
                } else {
                    throw new Error("API 返回的数据非法");
                }
            } catch (e) {
                console.warn("API连接失败，正在自动激活沙盒仿真模式...", e);
                // 2. 降级渲染：高保真沙盒数据集
                allEndpointsData = SANDBOX_FALLBACK_DATA;
                
                // 计算 KPI
                const totalDailyTokens = allEndpointsData.reduce((sum, n) => sum + n.daily_tokens, 0);
                const totalCost = allEndpointsData.reduce((sum, n) => sum + n.cost_usd, 0);
                const activeCount = allEndpointsData.filter(n => n.status === 'ACTIVE').length;
                const blacklistCount = allEndpointsData.filter(n => n.status === 'BLACKLISTED').length;
                
                document.getElementById('kpiTotalNodes').textContent = allEndpointsData.length;
                document.getElementById('kpiTotalTokens').textContent = formatNumber(totalDailyTokens);
                document.getElementById('kpiActiveCount').textContent = `${activeCount} / ${allEndpointsData.length}`;
                document.getElementById('kpiActiveCountSub').textContent = `${blacklistCount} 个黑名单`;
                document.getElementById('kpiCost').textContent = `$${totalCost.toFixed(3)}`;

                // 更新状态条
                statusBanner.className = 'status-banner sandbox';
                statusText.textContent = `⚠️ 无法连接本地后台服务，已自动载入算力池高保真仿真数据`;
            }

            renderGrid();
        }

        // 渲染算力卡片网格
        function renderGrid() {
            const grid = document.getElementById('nodeGrid');
            
            // 过滤与搜索
            let filteredNodes = allEndpointsData.filter(node => {
                // 1. 标签过滤
                if (currentFilter === 'volcengine' && node.platform !== 'volcengine') return false;
                if (currentFilter === 'bailian' && node.platform !== 'bailian' && node.platform !== 'deepseek') return false;
                if (currentFilter === 'blacklisted' && node.status !== 'BLACKLISTED') return false;
                
                // 2. 搜索关键词过滤
                if (searchQuery) {
                    const query = searchQuery.toLowerCase();
                    return node.id.toLowerCase().includes(query) || 
                           node.pool_id.toLowerCase().includes(query) ||
                           node.provider.toLowerCase().includes(query);
                }
                return true;
            });

            if (filteredNodes.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🛸</div>
                        <h3>未找到任何端点</h3>
                        <p style="color: var(--muted); font-size: 0.9rem;">请尝试调整您的过滤标签或搜索关键词。</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredNodes.map(node => {
                let platformLabel = "未知平台";
                let tagClass = "tag-bailian";
                if (node.platform === 'volcengine') {
                    platformLabel = "火山引擎";
                    tagClass = "tag-volcengine";
                } else if (node.platform === 'bailian') {
                    platformLabel = "阿里百炼";
                    tagClass = "tag-bailian";
                } else if (node.platform === 'deepseek') {
                    platformLabel = "DeepSeek";
                    tagClass = "tag-deepseek";
                }

                let roundsColor = "var(--success)";
                if (node.burnout_rounds === 0 || node.status === 'BLACKLISTED') {
                    roundsColor = "var(--danger)";
                } else if (node.burnout_rounds < 30) {
                    roundsColor = "var(--warning)";
                }

                let statusLabel = "活跃正常";
                if (node.status === 'STANDBY') statusLabel = "热备待机";
                if (node.status === 'BLACKLISTED') statusLabel = "熔断封禁";

                return `
                    <div class="node-card">
                        <div class="platform-tag ${tagClass}">${platformLabel}</div>
                        <div class="node-id" title="${node.id}">${node.id}</div>
                        <div class="model-name" title="${node.id}">${node.provider}</div>
                        
                        <div class="stat-row">
                            <span class="stat-label">调度所属池</span>
                            <span class="stat-value" style="color: var(--accent);">${node.pool_id}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">物理健康状况</span>
                            <span class="status-pill ${node.status}">${statusLabel}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">调度权重</span>
                            <span class="stat-value">${node.tier === 1 ? '核心 (100)' : '备份 (30)'}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">物理节点耗时</span>
                            <span class="stat-value" style="font-family: monospace;">${node.avg_latency_ms} ms</span>
                        </div>
                        
                        <div class="progress-box">
                            <div class="progress-header">
                                <span>今日配额消耗</span>
                                <span>${node.quota_pct}% (Quota: ${formatNumber(node.daily_quota)})</span>
                            </div>
                            <div class="progress-container">
                                <div class="progress-bar" style="width: ${Math.min(node.quota_pct, 100)}%; background: ${node.quota_pct > 80 ? 'var(--danger)' : 'linear-gradient(90deg, var(--accent), #818cf8)'}"></div>
                            </div>
                        </div>

                        <div class="prediction-box">
                            <div class="prediction-header">
                                <span class="prediction-label">预测可承载</span>
                                <span class="prediction-value" style="color: ${roundsColor}">
                                    ${node.burnout_rounds === "∞" ? "无上限" : node.burnout_rounds + " 轮测试"}
                                </span>
                            </div>
                            <div class="prediction-sub">
                                基于标准医保审计任务平均消耗 4.5k Tokens 进行神经网络容量仿真测算。
                            </div>
                        </div>

                        ${node.last_error ? `
                            <div class="error-hint" title="${node.last_error}">
                                <strong>⚠️ 崩溃报告:</strong> ${node.last_error.length > 80 ? node.last_error.substring(0, 80) + '...' : node.last_error}
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        // Tab 过滤器切换
        function setFilter(filterType, element) {
            currentFilter = filterType;
            
            // 切换 Tab Active 状态
            const tabs = document.querySelectorAll('.filter-tab');
            tabs.forEach(tab => tab.classList.remove('active'));
            element.classList.add('active');
            
            renderGrid();
        }

        // 搜索框触发
        function handleSearch() {
            searchQuery = document.getElementById('searchInput').value;
            renderGrid();
        }

        // ⚡ 全量物理网络探活拨测
        async function triggerProbe() {
            const probeBtn = document.getElementById('probeBtn');
            if (probeBtn.disabled) return;
            
            probeBtn.disabled = true;
            probeBtn.textContent = '🔄 物理体检拨测中...';
            
            try {
                const res = await fetch(`${API_HOST}/api/usage/reset-blacklists`, { method: 'POST' });
                const json = await res.json();
                
                if (json.ok) {
                    alert('✅ 物理探活完成：全量算力链路成功重置并网！所有黑名单物理隔离已解除。');
                } else {
                    alert('❌ 服务异常: ' + json.error);
                }
            } catch (e) {
                // 仿真逻辑
                setTimeout(() => {
                    alert('✅ [沙盒仿真拨测成功] 已重置算力物理隔离，仿真链路全量节点健康度复苏至 100%！');
                    // 重置沙盒的黑名单状态
                    SANDBOX_FALLBACK_DATA.forEach(n => {
                        if (n.status === 'BLACKLISTED') {
                            n.status = 'ACTIVE';
                            n.burnout_rounds = 999;
                            n.last_error = null;
                            n.stability = 100;
                        }
                    });
                    loadData();
                }, 1000);
            } finally {
                probeBtn.disabled = false;
                probeBtn.textContent = '⚡ 触发全网体检';
                loadData();
            }
        }

        // 初始化
        loadData();
        
        // 自动轮询机制（15秒）
        setInterval(() => {
            loadData();
        }, 15000);
    </script>
</body>
</html>
