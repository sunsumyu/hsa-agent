<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>HSA-Agent Token 成本治理中心</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --card-bg: #0f172a;
            --accent: #10b981;
            --text: #f8fafc;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; padding: 30px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid #1e293b; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; padding-bottom: 15px; }
        .model-table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        .model-table th, .model-table td { padding: 12px; text-align: left; border-bottom: 1px solid #1e293b; }
        .health-bar { height: 8px; border-radius: 4px; background: #334155; overflow: hidden; }
        .health-fill { height: 100%; background: var(--accent); }
        .back-btn { text-decoration: none; color: #94a3b8; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>💰 Token 成本治理中心</h1>
        <a href="index.html" class="back-btn">← 返回指挥门户</a>
    </div>

    <div class="grid">
        <div class="card" style="grid-column: span 2;">
            <h3>📊 供应商消耗占比 (Market Share)</h3>
            <canvas id="usagePie" height="150"></canvas>
        </div>
        <div class="card">
            <h3>💸 今日预算执行 (Budget)</h3>
            <div style="font-size: 2.5rem; font-weight: 800; color: var(--accent);">$0.42</div>
            <p style="color: #94a3b8;">预算配额: $5.00 / 日</p>
            <div class="health-bar" style="margin-top: 20px;"><div class="health-fill" style="width: 8.4%;"></div></div>
        </div>
    </div>

    <div class="card" style="margin-top: 30px;">
        <h3>🛡️ 节点健康状态与负载 (Node Health)</h3>
        <table class="model-table">
            <thead>
                <tr>
                    <th>节点 ID</th>
                    <th>供应商</th>
                    <th>状态</th>
                    <th>今日请求数</th>
                    <th>健康分</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>qwen-plus-1220</td>
                    <td>Aliyun (Tier-1)</td>
                    <td><span style="color: #22c55e;">● 活跃</span></td>
                    <td>142</td>
                    <td><div class="health-bar"><div class="health-fill" style="width: 98%;"></div></div></td>
                </tr>
                <tr>
                    <td>deepseek-v3</td>
                    <td>DeepSeek (Tier-2)</td>
                    <td><span style="color: #22c55e;">● 活跃</span></td>
                    <td>85</td>
                    <td><div class="health-bar"><div class="health-fill" style="width: 95%;"></div></div></td>
                </tr>
                <tr>
                    <td>gpt-4o-mini</td>
                    <td>Azure (Tier-1)</td>
                    <td><span style="color: #f59e0b;">● 熔断重试中</span></td>
                    <td>12</td>
                    <td><div class="health-bar"><div class="health-fill" style="width: 40%; background: #f59e0b;"></div></div></td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        const ctx = document.getElementById('usagePie').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Aliyun (Qwen)', 'DeepSeek', 'Azure (GPT)', 'Others'],
                datasets: [{
                    data: [65, 25, 5, 5],
                    backgroundColor: ['#0ea5e9', '#10b981', '#f59e0b', '#6366f1'],
                    borderWidth: 0
                }]
            },
            options: {
                cutout: '70%',
                plugins: { legend: { position: 'right', labels: { color: '#f8fafc' } } }
            }
        });
    </script>
</body>
</html>
