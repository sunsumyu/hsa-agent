<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSA Model Operations Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050a14; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .status-live { background: #10b981; }
        .status-cooling { background: #ef4444; }
        .status-critical { border-color: #ef4444 !important; background: rgba(239, 68, 68, 0.1) !important; box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); }
        .status-warning { border-color: #f59e0b !important; background: rgba(245, 158, 11, 0.05) !important; }
        .glow-red { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="p-6">
    <div class="max-w-[1600px] mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">HSA Model Operations Center</h1>
                <p class="text-slate-400 text-sm mt-1 flex items-center gap-2">全量联动版 V8.0 | 251项算力实时审计</p>
            </div>
            <div class="flex gap-3">
                <button onclick="fetchStatus()" class="glass px-3 py-1.5 rounded-lg hover:bg-slate-800 transition-all flex items-center gap-2 text-sm"><i data-lucide="refresh-cw" class="w-4 h-4"></i> 刷新</button>
                <button onclick="resetBlacklist()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-1.5 rounded-lg transition-all text-sm flex items-center gap-2"><i data-lucide="zap" class="w-4 h-4"></i> 一键复活节点</button>
            </div>
        </header>

        <!-- Main Stats -->
        <div class="grid grid-cols-4 gap-4 mb-8">
            <div class="glass p-4 rounded-xl"><div class="text-slate-500 text-xs mb-1 uppercase tracking-tighter">今日应用消耗 (Local)</div><div id="total-tokens" class="text-xl font-bold font-mono">0</div></div>
            <div class="glass p-4 rounded-xl"><div class="text-slate-500 text-xs mb-1 uppercase tracking-tighter">存活节点 / 总数</div><div id="live-nodes" class="text-xl font-bold text-emerald-400">0 / 0</div></div>
            <div class="glass p-4 rounded-xl"><div class="text-slate-500 text-xs mb-1 uppercase tracking-tighter">当前系统负载 (RPM)</div><div id="total-rpm" class="text-xl font-bold text-blue-400">0</div></div>
            <div id="asset-warning-box" class="glass p-4 rounded-xl border-amber-500/50"><div class="text-amber-500 text-xs mb-1 uppercase font-bold">云端资产警告 (Cloud)</div><div id="warning-count" class="text-xl font-bold text-amber-500">0 Items</div></div>
        </div>

        <div class="mb-6">
            <div class="relative w-full max-w-xl">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                <input type="text" id="model-search" oninput="handleSearch()" placeholder="搜索 251+ 个模型 (例如: qwen3.6, deepseek)..." class="w-full glass pl-10 pr-4 py-2.5 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
            <div>
                <h2 class="text-sm font-bold mb-4 uppercase tracking-widest text-blue-400 flex items-center gap-2"><i data-lucide="cpu" class="w-4 h-4"></i> 核心集群 (Tier-1)</h2>
                <div id="core-grid" class="grid grid-cols-1 xl:grid-cols-2 gap-4"></div>
            </div>
            <div>
                <h2 class="text-sm font-bold mb-4 uppercase tracking-widest text-slate-500 flex items-center gap-2"><i data-lucide="shield" class="w-4 h-4"></i> 备用/经济集群 (Tier-2/3)</h2>
                <div id="backup-grid" class="grid grid-cols-1 xl:grid-cols-2 gap-4"></div>
            </div>
        </div>

        <h2 class="text-sm font-bold mb-4 uppercase tracking-widest text-emerald-400 flex items-center gap-2">
            <i data-lucide="layout-grid" class="w-4 h-4"></i> 算力审计墙 (Discovery - <span id="discovery-count">0</span> 项)
        </h2>
        <div id="discovery-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-3 mb-20"></div>
    </div>

    <script>
        const LOGOS = {
            volcengine: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 22H22L12 2Z" fill="#7C3AED"/><path d="M12 8L7 22H17L12 8Z" fill="white" fill-opacity="0.5"/></svg>`,
            bailian: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none"><circle cx="7" cy="12" r="5" fill="#FF6A00"/><circle cx="17" cy="12" r="5" fill="#FF9900" fill-opacity="0.6"/></svg>`
        };

        let lastData = null;

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                lastData = await response.json();
                updateDashboard(lastData);
            } catch (error) { console.error('Dashboard Error:', error); }
        }

        async function resetBlacklist() {
            try {
                await fetch('/api/reset', { method: 'POST' });
                fetchStatus();
            } catch (error) { console.error(error); }
        }

        function handleSearch() {
            if (lastData) updateDashboard(lastData);
        }

        function createNodeCard(node) {
            const statusColor = node.is_cooling ? 'status-cooling' : 'status-live';
            const isCritical = node.cloud_status === 'Critical' || node.cloud_status === 'Low';
            const cardClass = isCritical ? 'status-critical glow-red' : '';
            
            return `
                <div class="glass p-4 rounded-xl flex flex-col gap-3 relative overflow-hidden border-l-4 ${node.is_cooling ? 'border-red-500' : 'border-emerald-500'} ${cardClass}">
                    ${isCritical ? '<div class="absolute top-0 right-0 bg-red-600 text-[8px] font-bold px-2 py-0.5 rounded-bl-lg animate-pulse z-20">ASSET ALERT</div>' : ''}
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-2">
                            ${LOGOS[node.platform?.toLowerCase()] || ''}
                            <span class="font-bold text-sm truncate max-w-[140px]">${node.id}</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <span class="w-2 h-2 rounded-full ${statusColor}"></span>
                            <span class="text-[9px] uppercase text-slate-500">${node.is_cooling ? 'Cooling' : 'Live'}</span>
                        </div>
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <div class="flex justify-between text-[10px]"><span class="text-slate-500">Local Usage</span><span class="font-mono text-slate-300">${node.daily_tokens.toLocaleString()} / ${node.daily_quota.toLocaleString()}</span></div>
                        <div class="h-1 w-full bg-slate-800 rounded-full overflow-hidden"><div class="h-full bg-blue-500" style="width: ${node.token_usage_pct}%"></div></div>
                    </div>
                    ${node.cloud_remaining ? `
                        <div class="bg-indigo-500/10 p-2 rounded-lg border border-indigo-500/20">
                            <div class="flex justify-between text-[10px] items-center">
                                <span class="text-indigo-300 font-bold flex items-center gap-1"><i data-lucide="cloud" class="w-3 h-3"></i> 云端总余量</span>
                                <span class="font-mono ${isCritical ? 'text-red-400' : 'text-indigo-200'}">${node.cloud_remaining}</span>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function updateDashboard(data) {
            const coreGrid = document.getElementById('core-grid');
            const backupGrid = document.getElementById('backup-grid');
            const discoveryGrid = document.getElementById('discovery-grid');
            const searchTerm = document.getElementById('model-search').value.toLowerCase();
            
            coreGrid.innerHTML = ''; backupGrid.innerHTML = ''; discoveryGrid.innerHTML = '';

            let totalTokens = 0, liveCount = 0, nodeCount = 0, warnings = 0;
            
            (data.tiers.core || []).forEach(node => {
                totalTokens += node.daily_tokens; nodeCount++;
                if (!node.is_cooling) liveCount++;
                if (node.cloud_status === 'Critical' || node.cloud_status === 'Low') warnings++;
                coreGrid.innerHTML += createNodeCard(node);
            });
            (data.tiers.backup || []).forEach(node => {
                totalTokens += node.daily_tokens; nodeCount++;
                if (!node.is_cooling) liveCount++;
                backupGrid.innerHTML += createNodeCard(node);
            });

            const filteredDiscovery = (data.discovery || []).filter(item => 
                !searchTerm || item.name.toLowerCase().includes(searchTerm)
            );

            document.getElementById('discovery-count').innerText = data.total_models || 0;

            // 分页/限制渲染逻辑：如果没有搜索，只显示前 100 个以保证流畅
            const displayList = searchTerm ? filteredDiscovery : filteredDiscovery.slice(0, 100);

            displayList.forEach(item => {
                const isCritical = item.status === 'Critical' || item.status === 'Low';
                discoveryGrid.innerHTML += `
                    <div class="glass p-3 rounded-lg border border-white/5 flex flex-col gap-2 ${isCritical ? 'status-critical' : ''}">
                        <div class="flex justify-between items-start">
                            <div class="flex items-center gap-1.5">
                                ${LOGOS[item.platform?.toLowerCase()] || ''}
                                <span class="text-[10px] font-bold truncate max-w-[90px]" title="${item.name}">${item.name}</span>
                            </div>
                            <span class="text-[8px] px-1 rounded ${isCritical ? 'bg-red-500/20 text-red-400' : 'bg-slate-800 text-slate-500'}">${item.status || 'OK'}</span>
                        </div>
                        <div class="flex justify-between text-[9px] font-mono">
                            <span class="opacity-40 uppercase">Rem</span>
                            <span class="${isCritical ? 'text-red-400 font-bold' : 'text-slate-400'}">${item.remaining}</span>
                        </div>
                        <div class="h-0.5 w-full bg-slate-800 rounded-full overflow-hidden">
                            <div class="h-full ${isCritical ? 'bg-red-500' : 'bg-emerald-500/40'}" style="width: 70%"></div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('total-tokens').innerText = totalTokens.toLocaleString();
            document.getElementById('live-nodes').innerText = `${liveCount} / ${nodeCount}`;
            document.getElementById('total-rpm').innerText = data.tiers.core.reduce((acc, n) => acc + n.rpm, 0);
            document.getElementById('warning-count').innerText = `${warnings} Assets`;
            lucide.createIcons();
        }

        setInterval(fetchStatus, 5000);
        window.onload = fetchStatus;
    </script>
</body>
</html>
