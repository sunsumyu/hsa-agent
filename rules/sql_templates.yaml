# ============================================================
# SQL Template Registry — 审计规则 SQL 模板库
# ============================================================
# 新增规则只需在此文件添加模板, 无需修改 Python 源码。
# 占位符: {table} = 表名, {limit} = 返回限制, {time_filter} = 时间过滤
# ============================================================

templates:
  GENDER_CONFLICT:
    description: "性别与药品/诊疗项目冲突检测"
    category: rule
    default_table: fqz_fymx_test
    default_limit: 50
    tolerance: 50000
    methodology: >
      【审计方法论】性别冲突校验：通过费用明细表 (fqz_fymx_test) JOIN 医保三大目录，
      利用国家标准的 gender_limit 字段进行精准对撞。
      合规依据：《疾病分类与代码国家临床版(ICD-10)》
      及《医疗保障基金使用监督管理条例》第十五条。
    policy_basis: "《医疗保障基金使用监督管理条例》第十五条"
    sql_template: |
      SELECT
          A.psn_no,
          A.fixmedins_name      AS hospital,
          A.gend                AS gender_code,
          A.hilist_name         AS hilist_name,
          C.nat_hi_druglist_memo AS rule_limit,
          A.det_item_fee_sumamt AS amount,
          A.setl_time           AS setl_time
      FROM {table} A
      LEFT JOIN fqz_drug_mcs_info_list C ON A.hilist_code = C.med_list_code
      WHERE A.setl_time >= '2024-01-01' AND A.setl_time <= '2024-12-31'
        AND A.gend = '1'
        AND (
            C.nat_hi_druglist_memo LIKE '%限女性%'
            OR A.hilist_name LIKE '%妇科%'
            OR A.hilist_name LIKE '%产科%'
            OR A.hilist_name LIKE '%子宫%'
            OR A.hilist_name LIKE '%阴道%'
        )
      ORDER BY A.det_item_fee_sumamt DESC
      LIMIT {limit}

  HIGH_FREQ_DRUG_PURCHASE:
    description: "高频购药异常检测"
    category: rule
    default_table: fqz_gz_jzsj_all_ql
    default_limit: 50
    tolerance: 1000
    methodology: >
      【审计方法论】高频购药核查：按 psn_no 执行窗口聚合。
      判定标准：自然月内同一药品购药频次 > 4次 或 累计剂量超过临床用药指南 200%。
      合规依据：《处方管理办法》及医保限额规定。
    policy_basis: "《处方管理办法》"
    sql_template: |
      SELECT
          psn_no,
          fixmedins_name AS drug_store,
          count() AS purchase_count,
          min(setl_time) AS first_purchase,
          max(setl_time) AS last_purchase,
          sum(medfee_sumamt) AS sum_medfee_sumamt,
          sum(fund_pay_sumamt) AS sum_fund_pay_sumamt
      FROM {table}
      WHERE med_type = '定点药店购药'
        AND toYear(toDateTime(setl_time)) = 2024
      GROUP BY psn_no, fixmedins_code, fixmedins_name
      HAVING purchase_count >= 10
      ORDER BY purchase_count DESC
      LIMIT {limit}

  CROSS_STORE_HIGH_SPEND:
    description: "跨药店高消费异常检测"
    category: rule
    default_table: fqz_gz_jzsj_all_ql
    default_limit: 50
    tolerance: 1000
    methodology: >
      【审计方法论】跨药店高消费核查：按参保人聚合跨药店消费行为。
      判定标准：跨 5 家以上药店 且 基金支付超过 5000 元。
    policy_basis: "《医疗保障基金使用监督管理条例》"
    sql_template: |
      SELECT
          psn_no,
          count(DISTINCT fixmedins_code) AS store_count,
          count() AS total_purchases,
          sum(medfee_sumamt) AS sum_medfee_sumamt,
          sum(fund_pay_sumamt) AS sum_fund_pay_sumamt
      FROM {table}
      WHERE med_type = '定点药店购药'
        AND toYear(toDateTime(setl_time)) = 2024
      GROUP BY psn_no
      HAVING store_count >= 5 AND sum_fund_pay_sumamt > 5000
      ORDER BY sum_fund_pay_sumamt DESC
      LIMIT {limit}

  DECOMPOSITION_HOSPITALIZATION:
    description: "分解住院检测 (短期内二次入院)"
    category: rule
    default_table: fqz_gz_jzsj_all_ql
    default_limit: 50
    tolerance: 1000
    methodology: >
      【审计方法论】分解住院侦测：通过窗口函数对比相邻住院记录。
      判定标准：同一患者出院与下次入院间隔 <= 15天 且诊断高度相关。
      合规依据：《基本医疗保险定点医疗机构服务协议》关于禁止恶意分解住院的条款。
    policy_basis: "《基本医疗保险定点医疗机构服务协议》"
    sql_template: |
      SELECT psn_no, fixmedins_name,
             prev_end_date AS discharge_a,
             start_date AS admission_b,
             dateDiff('day', toDate(prev_end_date), toDate(start_date)) AS interval_days,
             prev_fee AS fee_a, medfee_sumamt AS fee_b
      FROM (
          SELECT psn_no, fixmedins_name, fixmedins_code, start_date, end_date,
                 medfee_sumamt, med_type,
                 lag(end_date) OVER (PARTITION BY psn_no, fixmedins_code ORDER BY start_date) AS prev_end_date,
                 lag(medfee_sumamt) OVER (PARTITION BY psn_no, fixmedins_code ORDER BY start_date) AS prev_fee
          FROM {table}
          WHERE toYear(toDateTime(start_date)) = 2024
      )
      WHERE prev_end_date IS NOT NULL
        AND med_type NOT LIKE '%药%'
        AND dateDiff('day', toDate(prev_end_date), toDate(start_date)) BETWEEN 1 AND 15
      ORDER BY interval_days ASC
      LIMIT {limit}

  CROSS_HOSPITAL_OVERLAP:
    description: "跨机构重复住院检测"
    category: rule
    default_table: fqz_gz_jzsj_all_ql
    default_limit: 50
    tolerance: 1000
    methodology: >
      【审计方法论】跨机构重复住院核查：执行时间区间交集运算。
      判定标准：(A.start <= B.end) AND (A.end >= B.start) 且机构编码不一致。
      合规依据：医保实时结算管理规定，严禁"同时住院"挂账。
    policy_basis: "医保实时结算管理规定"
    sql_template: |
      SELECT
          A.psn_no,
          A.fixmedins_name AS hospital_a,
          B.fixmedins_name AS hospital_b,
          A.start_date AS start_a,
          A.end_date AS end_a,
          B.start_date AS start_b,
          B.end_date AS end_b,
          B.medfee_sumamt AS fee_b
      FROM {table} A
      JOIN {table} B ON A.psn_no = B.psn_no
      WHERE A.fixmedins_code != B.fixmedins_code
        AND A.med_type LIKE '%住院%' AND B.med_type LIKE '%住院%'
        AND A.start_date >= '2024-01-01' AND B.start_date >= '2024-01-01'
        AND A.start_date <= B.end_date
        AND B.start_date <= A.end_date
        AND A.setl_id < B.setl_id
      ORDER BY fee_b DESC
      LIMIT {limit}

  REPEAT_BILLING_DETECTOR:
    description: "同日同院重复收费检测"
    description: "同一参保人、同一天、同一机构多次结算异常探测"
    category: rule
    default_table: fqz_fymx_test
    default_limit: 50
    tolerance: 50000
    methodology: "Phase 1: SQL. 使用联合主键 (psn_no + date + inst) 进行探测。核心在于 HAVING visit_count > 1，确保检出的是多笔独立交易。"
    policy_basis: "《医疗服务价格目录》"
    sql_template: |
      SELECT 
          psn_no, 
          toDate(substring(toString(setl_time), 1, 10)), 
          fixmedins_name,
          count(DISTINCT setl_id),
          sum(det_item_fee_sumamt),
          groupArray(setl_id)
      FROM {table}
      WHERE setl_time >= '2024-01-01' AND setl_time <= '2024-12-31'
      GROUP BY psn_no, toDate(substring(toString(setl_time), 1, 10)), fixmedins_name, fixmedins_code
      HAVING count(DISTINCT setl_id) > 1
      ORDER BY count(DISTINCT setl_id) DESC, sum(det_item_fee_sumamt) DESC
      LIMIT {limit}

  CONTACT_SHARING_DETECTOR:
    description: "患者与职工共用联系方式检测"
    category: rule
    default_table: fqz_gz_jzsj_all_ql
    default_limit: 50
    tolerance: 1000
    methodology: >
      Phase 1: Graph. 使用 query_fraud_ring 工具发现共用手机号/家庭关系的节点。
      Phase 2: SQL. 针对图谱产出的重点账号进行业务量聚合。
      Phase 3: 产出报告。严禁使用单库 SQL 直接执行，必须有图谱执行记录。
    policy_basis: "《医疗保障基金使用监督管理条例》"
    sql_template: |
      -- [强制联邦模式] 仅针对图谱发现的共享手机号进行精确匹配
      SELECT
          A.psn_no,
          A.psn_name,
          A.fixmedins_name,
          A.tel,
          count(DISTINCT A.setl_id) AS visit_count,
          sum(A.medfee_sumamt) AS total_amt
      FROM {table} A
      WHERE A.setl_time >= '2024-01-01'
        AND A.tel IN ({shared_contacts}) -- 此处由 FederatedAuditSkill 自动侧载注入
      GROUP BY A.psn_no, A.psn_name, A.fixmedins_name, A.tel
      HAVING visit_count > 3
      ORDER BY total_amt DESC
      LIMIT {limit}
